<!DOCTYPE html>
<html lang="th">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>โปรแกรมฝึก GTO โป๊กเกอร์</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --felt: #0d1f12;
      --felt-mid: #112318;
      --felt-edge: #0a1a0e;
      --gold: #c9a84c;
      --gold-bright: #f0c94a;
      --gold-dim: #7a6020;
      --text-main: #e8dfc0;
      --text-dim: #8a7d5a;
      --accent-green: #2ecc71;
      --accent-red: #e74c3c;
      --card-bg: #faf3e0;
      --card-border: #d4b483;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--felt-edge);
      color: var(--text-main);
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, transparent 2px, transparent 4px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,0.01) 0px, transparent 2px, transparent 4px);
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 0 32px;
    }

    .header {
      background: linear-gradient(180deg, #0a1a0e 0%, var(--felt) 100%);
      border-bottom: 2px solid var(--gold-dim);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
    }

    .logo span { color: var(--gold-bright); }

    .logo-th {
      font-family: 'Sarabun', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      background: rgba(201,168,76,0.15);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    .section-title {
      font-family: 'Sarabun', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold-dim);
      letter-spacing: 1px;
      padding: 16px 20px 8px;
    }

    .tab-bar {
      display: flex;
      background: var(--felt);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 0 8px;
      gap: 2px;
    }

    .tab-btn {
      font-family: 'Sarabun', sans-serif;
      font-weight: 700;
      font-size: 13px;
      padding: 10px 14px;
      color: var(--text-dim);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .parser-panel { padding: 16px 20px; }

    .hand-input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 6px;
      color: var(--text-main);

      font-size: 11px;
      line-height: 1.6;
      padding: 12px;
      resize: vertical;
      min-height: 160px;
      outline: none;
      transition: border-color 0.2s;
    }

    .hand-input:focus { border-color: var(--gold-dim); }
    .hand-input::placeholder { color: var(--text-dim); opacity: 0.5; }

    .parse-btn {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      background: linear-gradient(135deg, #1a3a1f, #0f2614);
      border: 1px solid var(--gold-dim);
      border-radius: 6px;
      color: var(--gold);
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 800;

    .parse-btn:hover {

    .action-row {

      border: 1px solid rgba(46,204,113,0.4);

    .modal-close-btn {

    /* Scenario Library */
    .scenario-card {

    ::-webkit-scrollbar { width: 4px; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════
// ██  ส่วนที่ 1: Parser Hand History  ██
// รองรับ format N8 / PokerCraft
// ═══════════════════════════════════════════════════════

const RANK_MAP = { 'A':'A','K':'K','Q':'Q','J':'J','T':'T',
  '10':'T','9':'9','8':'8','7':'7','6':'6','5':'5','4':'4','3':'3','2':'2' };

const SUIT_MAP = { 'h':'h','d':'d','c':'c','s':'s',
  'H':'h','D':'d','C':'c','S':'s','♥':'h','♦':'d','♣':'c','♠':'s' };

function parseCard(token) {
  if (!token) return null;
  token = token.trim().replace(/[[\]()]/g, '');
  if (token.length < 2) return null;
  let rank, suit;
  if (SUIT_MAP[token[0]]) {
    suit = SUIT_MAP[token[0]];
    rank = RANK_MAP[token.slice(1).toUpperCase()] || null;
  } else {
    if (token.length === 3 && token.startsWith('10')) {
      rank = 'T'; suit = SUIT_MAP[token[2]] || null;
    } else {
      rank = RANK_MAP[token.slice(0, -1).toUpperCase()] || null;
      suit = SUIT_MAP[token[token.length - 1]] || null;
    }
  }
  if (!rank || !suit) return null;
  return { rank, suit };
}

function parseHandHistory(raw) {
  const result = {
    heroCards: [], boardCards: [], flop: [], turn: null, river: null,
    potSize: 0, effectiveStack: 0, villainBet: 0,
    heroPosition: '', street: 'preflop', handId: '', parseErrors: [],
  };

  if (!raw || raw.trim().length < 10) {
    result.parseErrors.push('ข้อมูลสั้นเกินไปหรือว่างเปล่า');
    return result;
  }

  const idMatch = raw.match(/Hand\s*#?\s*(\w+)/i);
  if (idMatch) result.handId = idMatch[1];

  const heroPatterns = [
    /Dealt to\s+\w+\s*\[([^\]]+)\]/i,
    /Hero[^:]*:\s*\[([^\]]+)\]/i,
    /Hole cards[:\s]+([A-T2-9♠♥♦♣shdc]{2,8})/i,
    /Hero has\s+([A-T2-9♠♥♦♣shdc\s]+)/i,
  ];
  for (const pat of heroPatterns) {
    const m = raw.match(pat);
    if (m) {
      const tokens = m[1].trim().split(/\s+/);
      result.heroCards = tokens.map(parseCard).filter(Boolean);
      if (result.heroCards.length >= 2) break;
    }
  }

  const flopMatch = raw.match(/FLOP[^[]*\[([^\]]+)\]/i);
  if (flopMatch) {
    result.flop = flopMatch[1].trim().split(/\s+/).map(parseCard).filter(Boolean);
    result.boardCards = [...result.flop];
    result.street = 'flop';
  }

  const turnMatch = raw.match(/TURN[^[]*\[[^\]]+\]\s*\[([^\]]+)\]/i);
  if (turnMatch) {
    result.turn = parseCard(turnMatch[1].trim().split(/\s+/)[0]);
    if (result.turn) { result.boardCards.push(result.turn); result.street = 'turn'; }
  }

  const riverMatch = raw.match(/RIVER[^[]*\[[^\]]+\]\s*\[([^\]]+)\]/i);
  if (riverMatch) {
    result.river = parseCard(riverMatch[1].trim().split(/\s+/)[0]);
    if (result.river) { result.boardCards.push(result.river); result.street = 'river'; }
  }

  const potPatterns = [/Total pot[:\s]+(\d+(?:\.\d+)?)/i, /Pot[:\s]+(\d+(?:\.\d+)?)/i, /pot of\s+(\d+)/i];
  for (const pat of potPatterns) {
    const m = raw.match(pat);
    if (m) { result.potSize = parseFloat(m[1]); break; }
  }

  const stackPatterns = [/Effective stack[:\s]+(\d+(?:\.\d+)?)/i, /Stack[:\s]+(\d+(?:\.\d+)?)/i];
  for (const pat of stackPatterns) {
    const m = raw.match(pat);
    if (m) { result.effectiveStack = parseFloat(m[1]); break; }
  }

  const betPatterns = [
    /(?:Villain|OOP|IP|BTN|BB|SB|UTG|HJ|CO|MP)\s+bets\s+(\d+(?:\.\d+)?)/i,
    /(?:Villain|OOP|IP|BTN|BB|SB|UTG|HJ|CO|MP)\s+raises?\s+to\s+(\d+(?:\.\d+)?)/i,
    /bets\s+(\d+(?:\.\d+)?)/i,
    /raises?\s+to\s+(\d+(?:\.\d+)?)/i,
  ];
  for (const pat of betPatterns) {
    const allMatches = [...raw.matchAll(new RegExp(pat.source, 'gi'))];
    if (allMatches.length > 0) {
      result.villainBet = parseFloat(allMatches[allMatches.length - 1][1]);
      break;
    }
  }

  return result;
}

// ██  ส่วนที่ 2: คำนวณคณิตศาสตร์โป๊กเกอร์  ██
// ═══════════════════════════════════════════════════════

function calculatePotOdds(potSize, villainBet) {
  if (villainBet <= 0) return { ratio: '—', percentage: 0, callAmount: 0 };
  const totalPot = potSize + villainBet;
  const percentage = (villainBet / totalPot) * 100;
  const ratio = `${Math.round(potSize / villainBet)}:1`;
  return { ratio, percentage: parseFloat(percentage.toFixed(1)), callAmount: villainBet };
}

function calculateMDF(villainBet, potSize) {
  if (villainBet <= 0) return 0;
  return parseFloat(((potSize / (potSize + villainBet)) * 100).toFixed(1));
}

function calculateBetSizingClass(villainBet, potSize) {
  if (potSize === 0) return 'unknown';
  const ratio = villainBet / potSize;
  if (ratio >= 1.0) return 'overpot';
  if (ratio >= 0.75) return 'large';
  if (ratio >= 0.5) return 'half';
  if (ratio >= 0.33) return 'third';
  return 'small';
}

// ── Engine ประเมินผลการตัดสินใจตาม GTO ──
// TODO: แทนที่ equity ด้วย Monte Carlo / exact enumeration
// TODO: เพิ่ม Bayes range update หลังแต่ละ street
function evaluateAction(parsedHand, userAction, handStrength) {
  const { potSize, villainBet } = parsedHand;
  const potOdds = calculatePotOdds(potSize, villainBet);
  const mdf = calculateMDF(villainBet, potSize);
  const betClass = calculateBetSizingClass(villainBet, potSize);

  const STRENGTH_EQUITY = {
    'top_pair_top_kicker': 72, 'top_pair': 62, 'second_pair': 40,
    'third_pair': 28, 'overpair': 78, 'two_pair': 82, 'set': 90,
    'flush_draw': 35, 'straight_draw': 30, 'air': 12, 'bluff_catcher': 38,
  };

  const equity = STRENGTH_EQUITY[handStrength] || 40;
  const needsEquity = potOdds.percentage;
  const betPct = potSize > 0 ? Math.round((villainBet / potSize) * 100) : 0;

  let correctAction, reasoning;

  if (betClass === 'overpot') {
    const evCall = (equity / 100) * (potSize + villainBet) - ((1 - equity / 100) * villainBet);
    if (equity < 35) {
      correctAction = 'FOLD';
      reasoning = `Villain เดิมพัน Overpot (${betPct}% ของ pot) → range ถูก polarize เป็น "ไม้แข็งมาก" หรือ "บลัฟ" เท่านั้น
      
คุณต้องการ equity อย่างน้อย ${needsEquity}% เพื่อ call คุ้ม แต่มือของคุณ (${getHandLabel(handStrength)}) มี equity ประมาณ ${equity}% เท่านั้น

EV(call) ≈ ${evCall.toFixed(0)} chips → ติดลบ → พับถูกต้อง`;
    } else if (equity >= 70) {
      correctAction = 'RAISE';
      reasoning = `มือของคุณ (${getHandLabel(handStrength)}) แข็งมาก ~${equity}% equity vs range ที่ Villain Overpot

การ Raise สร้าง EV สูงสุด เพราะคุณบีบ bluff range ของ Villain และชาร์จ draw ในราคาแพง`;
    } else {
      correctAction = 'CALL';
      reasoning = `Pot odds ต้องการ ${needsEquity}% equity คุณมี ~${equity}% → อยู่เหนือจุด breakeven เล็กน้อย

Call ได้กำไรระยะยาว MDF = ${mdf}% → คุณต้อง defend อย่างน้อยนี้เพื่อไม่ให้ Villain โกง auto-profit`;
    }
  } else if (betClass === 'large' || betClass === 'half') {
    if (equity < needsEquity) {
      correctAction = 'FOLD';
      reasoning = `Pot odds ต้องการ ${needsEquity}% equity แต่ ${getHandLabel(handStrength)} ของคุณมีแค่ ~${equity}%

EV(call) = (${equity}% × ${potSize + villainBet}) − (${100-equity}% × ${villainBet}) → ติดลบ → พับรักษา EV`;
    } else if (equity >= 70) {
      correctAction = 'RAISE';
      reasoning = `${getHandLabel(handStrength)} (~${equity}% equity) แข็งพอที่จะ Raise เพื่อ value

การ call ก็ถูก แต่ raise ด้วยมือที่ดีที่สุดของคุณช่วย build pot ตอนที่นำอยู่`;
    } else {
      correctAction = 'CALL';
      reasoning = `Equity ของคุณ (~${equity}%) เกินจุด breakeven ที่ pot odds กำหนด (${needsEquity}%)

EV(call) > 0 → call คุ้ม MDF = ${mdf}% → ต้อง defend ความถี่นี้เพื่อป้องกัน Villain exploit`;
    }
  } else {
    if (equity < 25) {
      correctAction = 'FOLD';
      reasoning = `แม้ Villain เดิมพันเล็ก (${betPct}% pot) แต่ ${getHandLabel(handStrength)} (~${equity}% equity) ยังต่ำกว่า breakeven ที่ ${needsEquity}%

พับรอ spot ที่ดีกว่า`;
    } else {
      correctAction = 'CALL';
      reasoning = `Bet เล็กมาก → MDF กว้างถึง ${mdf}% คุณต้อง defend บ่อยมาก

${getHandLabel(handStrength)} (~${equity}% equity) ผ่าน bar ที่ ${needsEquity}% อย่างสบาย → call (หรือ semi-bluff raise) ถูก`;
    }
  }

  const verdict = userAction === correctAction ? 'correct' : 'incorrect';
  const evCall = parseFloat(((equity/100)*(potSize+villainBet) - ((1-equity/100)*villainBet)).toFixed(0));
  const evFold = 0;
  const evRaise = parseFloat((correctAction === 'RAISE' ? evCall * 1.15 : evCall * 0.85).toFixed(0));

  return { verdict, correctAction, reasoning, potOdds, mdf, betClass, equity, ev: { fold: evFold, call: evCall, raise: evRaise } };
}

function getHandLabel(key) {
  const map = {
    'top_pair_top_kicker': 'Top Pair Top Kicker',
    'top_pair': 'Top Pair',
    'second_pair': 'Second Pair',
    'third_pair': 'Third Pair',
    'overpair': 'Overpair',
    'two_pair': 'Two Pair',
    'set': 'Set / Trips',
    'flush_draw': 'Flush Draw',
    'straight_draw': 'Straight Draw',
    'bluff_catcher': 'Bluff Catcher',
    'air': 'Air / ไม่มีมือ',
  };
  return map[key] || key;
}

            <>
              <p className="section-title">
                สถานการณ์ · {STREET_TH[parsedHand.street]} {parsedHand.handId ? `· มือ #${parsedHand.handId}` : ''}
              </p>

              {/* โต๊ะไพ่ */}
              <div className="felt-table">
                <div style={{ display:'flex', justifyContent:'center', gap:8, marginBottom:14 }}>
                  <div style={{ textAlign:'center' }}>
                    <div className="street-label">คู่ต่อสู้ (VILLAIN)</div>
                    <div style={{ display:'flex', gap:6, justifyContent:'center' }}>
                      <VillainCardBack /><VillainCardBack />
                    </div>
                  </div>
                </div>

                <div className="street-section">
                  <div className="street-label">บอร์ด (BOARD)</div>
                  <div className="cards-row">
                    {parsedHand.flop.map((c, i) => <PlayingCard key={`f${i}`} card={c} delay={i} />)}
                    {parsedHand.flop.length < 3 && Array(3 - parsedHand.flop.length).fill(null).map((_, i) =>
                      <PlayingCard key={`fp${i}`} card={null} />)}
                    <div style={{ width:6 }} />
                    <PlayingCard card={parsedHand.turn} delay={3} />
                    <div style={{ width:6 }} />
                    <PlayingCard card={parsedHand.river} delay={4} />
                  </div>
                </div>

                <div className="pot-display">
                  <div className="pot-chip pulse-gold">
                    <div className="pot-chip-icon" />
                    <span className="pot-amount">
                      หม้อ: {parsedHand.potSize > 0 ? parsedHand.potSize.toLocaleString() : '—'}
                    </span>
                  </div>
                </div>

                <div className="street-section">
                  <div className="street-label">ไพ่ของคุณ (HERO)</div>
                  <div className="cards-row">
                    {parsedHand.heroCards.length > 0
                      ? parsedHand.heroCards.map((c, i) => <PlayingCard key={`h${i}`} card={c} delay={i} isHero={true} />)
                      : [0,1].map(i => <PlayingCard key={`hp${i}`} card={null} />)
                    }
                  </div>
                </div>
              </div>

              {/* Villain bet bar */}
              {parsedHand.villainBet > 0 && (
                <div className="villain-action-bar">
                  <div>
                    <div className="villain-tag">Villain เดิมพัน</div>
                    <div style={{ fontFamily:"'Sarabun'", fontSize:10, color:'var(--text-dim)', marginTop:2, fontWeight:600 }}>
                      {potOdds && parsedHand.potSize > 0 ? `${Math.round((parsedHand.villainBet / parsedHand.potSize) * 100)}% ของ pot` : ''}
                    </div>
                  </div>
                  <div className="villain-bet">{parsedHand.villainBet.toLocaleString()}</div>
                </div>
              )}

              {/* คณิตศาสตร์ */}
              {potOdds && (
                <div className="math-panel">
                  <div className="math-row">
                    <span className="math-key">Pot Odds (equity ขั้นต่ำ)</span>
                    <span className="math-val">{potOdds.ratio} ({potOdds.percentage}%)</span>
                  </div>
                  <div className="math-row">
                    <span className="math-key">MDF (defend ขั้นต่ำ)</span>
                    <span className="math-val">{mdf}%</span>
                  </div>
                  <div className="math-row">
                    <span className="math-key">Effective Stack</span>
                    <span className="math-val">{parsedHand.effectiveStack > 0 ? parsedHand.effectiveStack.toLocaleString() : '—'}</span>
                  </div>
                </div>
              )}

              {/* เลือกความแข็งของมือ */}
              <div style={{ padding:'12px 20px 0' }}>
                <div className="section-title" style={{ padding:'0 0 6px' }}>ความแข็งของมือคุณ</div>
                <select
                  value={handStrength}
                  onChange={e => setHandStrength(e.target.value)}
                  style={{
                    width:'100%', background:'rgba(0,0,0,0.4)',
                    border:'1px solid rgba(201,168,76,0.25)', borderRadius:6,
                    color:'var(--gold)', fontFamily:"'Sarabun', sans-serif",
                    fontSize:13, fontWeight:600, padding:'10px 12px',
                    outline:'none', cursor:'pointer',
                  }}>
                  {HAND_STRENGTHS.map(h => (
                    <option key={h.value} value={h.value} style={{ background:'#0d1f12' }}>{h.label}</option>
                  ))}
                </select>
              </div>

              <div className="gto-alert">
                ⚡ เลือกความแข็งมือด้านบน แล้วกดปุ่มด้านล่าง — GTO จะวิเคราะห์ให้ทันที
              </div>

              {/* ปุ่ม Action */}
              <div className="action-row">
                <button className="action-btn btn-fold" onClick={() => handleAction('FOLD')}>
                  <span className="btn-icon">✗</span>
                  พับ
                  <span className="btn-sublabel">FOLD</span>
                </button>
                <button className="action-btn btn-call" onClick={() => handleAction('CALL')}>
                  <span className="btn-icon">✓</span>
                  ตาม
                  <span className="btn-sublabel">{parsedHand.villainBet > 0 ? parsedHand.villainBet : 'CALL'}</span>
                </button>
                <button className="action-btn btn-raise" onClick={() => handleAction('RAISE')}>
                  <span className="btn-icon">↑</span>
                  ขึ้น
                  <span className="btn-sublabel">RAISE</span>
                </button>
              </div>
            </>
          )}
        </>
      )}

      {/* ── แท็บ: วิเคราะห์มือ ── */}
      {activeTab === 'parse' && (
        <div className="parser-panel">
          <p className="section-title" style={{ padding:'0 0 8px' }}>วาง Hand History (N8 / PokerCraft)</p>
          <textarea
            className="hand-input"
            value={rawInput}
            onChange={e => setRawInput(e.target.value)}
            placeholder={`Hand #12345\nDealt to Hero [Ah Kd]\n*** FLOP *** [As 7d 2c]\nPot: 200\nVillain bets 300\nEffective stack: 800`}
          />

          {parseError && (
            <div style={{ marginTop:8, padding:'8px 12px', background:'rgba(231,76,60,0.1)', border:'1px solid rgba(231,76,60,0.3)', borderRadius:6, fontFamily:"'Sarabun'", fontSize:12, fontWeight:600, color:'#e74c3c' }}>
              ⚠ {parseError}
            </div>
          )}

          <button className="parse-btn" onClick={handleParse}>วิเคราะห์มือไพ่นี้</button>

          {parsedHand && (
            <>
              <p className="section-title" style={{ padding:'16px 0 6px' }}>ข้อมูลที่อ่านได้</p>
              <div className="parsed-grid">
                <div className="stat-box">
                  <div className="stat-label">ไพ่ Hero</div>
                  <div className="stat-value small">
                    {parsedHand.heroCards.length > 0
                      ? parsedHand.heroCards.map(c => `${c.rank}${SUIT_SYMBOLS[c.suit]}`).join(' ')
                      : 'ไม่พบ'}
                  </div>
                </div>
                <div className="stat-box">
                  <div className="stat-label">บอร์ด</div>
                  <div className="stat-value small">
                    {parsedHand.boardCards.length > 0
                      ? parsedHand.boardCards.map(c => `${c.rank}${SUIT_SYMBOLS[c.suit]}`).join(' ')
                      : '—'}
                  </div>
                </div>
                <div className="stat-box">
                  <div className="stat-label">ขนาด Pot</div>
                  <div className="stat-value">{parsedHand.potSize || '—'}</div>
                </div>
                <div className="stat-box">
                  <div className="stat-label">Villain Bet</div>
                  <div className="stat-value" style={{ color:'#e74c3c' }}>{parsedHand.villainBet || '—'}</div>
                </div>
                <div className="stat-box">
                  <div className="stat-label">Eff. Stack</div>
                  <div className="stat-value small">{parsedHand.effectiveStack || '—'}</div>
                </div>
                <div className="stat-box">
                  <div className="stat-label">Street</div>
                  <div className="stat-value small">{STREET_TH[parsedHand.street] || '—'}</div>
                </div>
              </div>

              <button className="parse-btn"
                style={{ marginTop:12, background:'linear-gradient(135deg,#1a2a3a,#0f1e2e)', borderColor:'rgba(46,204,113,0.4)', color:'#2ecc71' }}
                onClick={() => setActiveTab('train')}>
                ไปหน้าฝึก ▶
              </button>
            </>
          )}
        </div>
      )}

      {/* ── แท็บ: โจทย์สำเร็จ ── */}
      {activeTab === 'library' && (
        <>
          <p className="section-title">โจทย์ฝึกสำเร็จรูป</p>
          {PRESET_SCENARIOS.map(s => (
            <div key={s.id} className="scenario-card" onClick={() => loadScenario(s)}>
              <div>
                <div className="scenario-name">{s.name}</div>
                <div className="scenario-desc">{s.description}</div>
              </div>
              <div style={{ marginLeft:12, flexShrink:0 }}>
                <span className={`scenario-tag tag-${s.difficulty}`}>
                  {s.difficulty === 'easy' ? 'ง่าย' : s.difficulty === 'medium' ? 'กลาง' : 'ยาก'}
                </span>
              </div>
            </div>
          ))}
          <div style={{ padding:'20px', textAlign:'center' }}>
            <p style={{ fontFamily:"'Sarabun'", fontSize:12, color:'var(--text-dim)', lineHeight:1.8 }}>
              เพิ่มโจทย์ได้โดยแก้ไข array <strong style={{color:'var(--gold-dim)'}}>PRESET_SCENARIOS</strong><br/>
              ในโค้ด HTML ของแอพนี้
            </p>
          </div>
        </>
      )}

      {feedbackResult && (
        <FeedbackModal result={feedbackResult} userAction={userAction} onClose={() => { setFeedbackResult(null); setUserAction(null); }} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
